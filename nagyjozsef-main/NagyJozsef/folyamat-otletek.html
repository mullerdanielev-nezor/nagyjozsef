<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hogyan zajlik — szekció ötletek</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#f7f3ec;--bg2:#efe9df;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.16)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}

.gallery{max-width:1240px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

.sec{background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(40px,5vw,64px) clamp(24px,4vw,54px);color:var(--head)}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
.sec h2{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(1.9rem,3.6vw,2.9rem);line-height:1.02;margin-top:12px;max-width:18ch}
.body{margin-top:clamp(32px,4vw,52px)}
.when{font-family:"Spline Sans Mono",monospace;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
h3{font-family:"Public Sans",sans-serif;font-weight:700;font-size:1.2rem;margin-top:3px}
.d{color:var(--sub);margin-top:6px;font-size:.94rem}
.num{font-family:"Big Shoulders Display",sans-serif;font-weight:800;color:var(--accent)}

/* A függőleges idővonal */
.A .body{position:relative;padding-left:64px}
.A .spine{position:absolute;left:26px;top:6px;bottom:6px;width:2px;background:var(--line)}
.A .st{position:relative;padding:14px 0 24px}
.A .dot{position:absolute;left:-52px;top:10px;width:54px;height:54px;border-radius:50%;background:#fff;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:"Big Shoulders Display";font-weight:800;font-size:1.3rem;color:var(--accent)}
.A .d{max-width:54ch}

/* B vízszintes lépések */
.B .body{display:grid;gap:18px}
@media(min-width:760px){.B .body{grid-template-columns:repeat(5,1fr)}}
.B .st{position:relative;padding-top:50px}
.B .st .dot{position:absolute;top:0;left:0;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Big Shoulders Display";font-weight:800}
@media(min-width:760px){.B .st:not(:last-child)::after{content:"";position:absolute;top:20px;left:48px;right:-9px;height:2px;background:var(--line)}}

/* C számozott kártyák */
.C .body{display:grid;gap:16px}
@media(min-width:600px){.C .body{grid-template-columns:1fr 1fr}}
@media(min-width:960px){.C .body{grid-template-columns:1fr 1fr 1fr}}
.C .st{background:#fff;border-radius:12px;padding:24px;border:1px solid var(--line);box-shadow:0 18px 40px -32px rgba(40,12,8,.4);position:relative}
.C .bn{position:absolute;top:14px;right:18px;font-family:"Big Shoulders Display";font-weight:800;font-size:2.4rem;color:color-mix(in oklab,var(--accent) 26%,transparent);line-height:1}

/* D cikcakk idővonal */
.D .body{position:relative}
.D .spine{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--line);transform:translateX(-1px)}
.D .st{position:relative;width:calc(50% - 36px);padding:14px 0 26px}
.D .st:nth-child(odd){margin-left:auto;padding-left:30px}
.D .st:nth-child(even){text-align:right;padding-right:30px}
.D .dot{position:absolute;top:12px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Big Shoulders Display";font-weight:800}
.D .st:nth-child(odd) .dot{left:-50px}.D .st:nth-child(even) .dot{right:-50px}
@media(max-width:680px){.D .spine{left:20px}.D .st,.D .st:nth-child(odd),.D .st:nth-child(even){width:auto;margin-left:48px;text-align:left;padding:14px 0 22px}.D .st .dot{left:-48px!important;right:auto!important}}

/* E nagy számok sorok */
.E .st{display:grid;grid-template-columns:auto 1fr;gap:clamp(16px,3vw,36px);align-items:baseline;padding:20px 0;border-top:1px solid var(--line)}
.E .st:last-child{border-bottom:1px solid var(--line)}
.E .bn{font-size:clamp(2.4rem,5vw,4rem);line-height:.9}
.E .d{max-width:60ch}

/* F kör-badge vízszintes */
.F .body{display:grid;gap:22px}
@media(min-width:820px){.F .body{grid-template-columns:repeat(5,1fr);gap:10px}}
.F .st{text-align:center;position:relative}
.F .circle{width:72px;height:72px;border-radius:50%;background:#fff;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:"Big Shoulders Display";font-weight:800;font-size:1.8rem;color:var(--accent);position:relative;z-index:1}
@media(min-width:820px){.F .st:not(:last-child)::after{content:"";position:absolute;top:36px;left:60%;right:-40%;height:2px;background:var(--line);z-index:0}}
.F .d{font-size:.88rem}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>„Hogyan zajlik" — szekció ötletek</h1>
  <p>Az 5 lépéseddel, terrakotta palettán. 6 elrendezés — válassz egyet.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (A–F), és beépítem az igazi index.html folyamat-szekciójába</footer>

<script>
const S=[
 ['1','Általában még aznap','Felhív','Engem ér el, nem egy központot. Beszélünk a falról, a hangulatról. Öt perc alatt kiderül a lényeg.'],
 ['2','Ingyenes · kötöttség nélkül','Kimegyek és felmérek','Megnézem a falakat, a felületet, és átbeszéljük a legjobb megoldást. A felmérés ingyenes.'],
 ['3','Egy-két napon belül','Egy világos ajánlatot kap','Fix ár, érthető nyelven. Mit festek, mivel, és mibe kerül — amit megbeszéltünk, annyit fizet.'],
 ['4','A munka méretétől függ','Felfestem','Tiszta munka, leterített bútorok, rendezett vonalak — úgy hagyom az otthonát, ahogy találtam, csak szebben.'],
 ['5','Amíg csak az otthona','Maradok az elérhetősége','Ha bármi gond adódna, visszamegyek és helyszínen orvosoljuk. Mindig ugyanaz az ember.'],
];
const head=`<span class="eyebrow">Hogyan zajlik</span><h2>Öt lépés, egy ember, semmi meglepetés.</h2>`;

const V={
 'A':{nm:'Függőleges idővonal',desc:'gerinc + körök',cls:'A',
   body:`<div class="spine"></div>`+S.map(s=>`<div class="st"><div class="dot">${s[0]}</div><div class="when">${s[1]}</div><h3>${s[2]}</h3><p class="d">${s[3]}</p></div>`).join('')},
 'B':{nm:'Vízszintes lépések',desc:'5 oszlop, összekötve',cls:'B',
   body:S.map(s=>`<div class="st"><div class="dot">${s[0]}</div><div class="when">${s[1]}</div><h3>${s[2]}</h3><p class="d">${s[3]}</p></div>`).join('')},
 'C':{nm:'Számozott kártyák',desc:'rács',cls:'C',
   body:S.map(s=>`<div class="st"><span class="bn num">${s[0]}</span><div class="when">${s[1]}</div><h3>${s[2]}</h3><p class="d">${s[3]}</p></div>`).join('')},
 'D':{nm:'Cikcakk idővonal',desc:'váltakozó oldal',cls:'D',
   body:`<div class="spine"></div>`+S.map(s=>`<div class="st"><div class="dot">${s[0]}</div><div class="when">${s[1]}</div><h3>${s[2]}</h3><p class="d">${s[3]}</p></div>`).join('')},
 'E':{nm:'Nagy számok sorok',desc:'óriás sorszám',cls:'E',
   body:S.map(s=>`<div class="st"><span class="bn num">${s[0]}</span><div><div class="when">${s[1]}</div><h3>${s[2]}</h3><p class="d">${s[3]}</p></div></div>`).join('')},
 'F':{nm:'Kör-badge vízszintes',desc:'lépcsős körök',cls:'F',
   body:S.map(s=>`<div class="st"><div class="circle">${s[0]}</div><div class="when">${s[1]}</div><h3>${s[2]}</h3><p class="d">${s[3]}</p></div>`).join('')},
};

document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${head}<div class="body">${v.body}</div></div>
  </section>`).join('');
</script>
</body>
</html>
