<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Szolgáltatás-rész — ötletek</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#ffffff;--bg2:#eaece4;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.14)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}

.gallery{max-width:1240px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

.sec{background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(40px,5vw,64px) clamp(24px,4vw,54px);color:var(--head)}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
.sec h2{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(1.9rem,3.6vw,2.9rem);line-height:1.02;margin-top:12px;max-width:20ch}
.sec .body{margin-top:clamp(30px,4vw,48px)}
.sec h3{font-family:"Public Sans",sans-serif;font-weight:700;font-size:1.22rem}
.sec p.d{color:var(--sub);margin-top:6px;font-size:.98rem;max-width:42ch}
.n{font-family:"Spline Sans Mono",monospace;font-size:.74rem;font-weight:600;color:var(--accent)}
.ic{display:inline-flex;color:var(--accent)}.ic svg{width:30px;height:30px}

/* V1 lista (jelenlegi) */
.v1 .body{display:grid;gap:2px;border-top:1px solid var(--line)}
@media(min-width:720px){.v1 .body{grid-template-columns:1fr 1fr}}
.v1 .i{display:flex;gap:18px;padding:24px 0;border-bottom:1px solid var(--line)}
.v1 .i .n{min-width:28px;padding-top:5px}

/* V2 kártyás rács */
.v2 .body{display:grid;gap:14px}
@media(min-width:680px){.v2 .body{grid-template-columns:1fr 1fr}}
.v2 .card{background:#fff;border-radius:12px;padding:26px;box-shadow:0 18px 40px -30px rgba(40,12,8,.4);transition:transform .25s,box-shadow .25s;border:1px solid var(--line)}
.v2 .card:hover{transform:translateY(-4px);box-shadow:0 30px 56px -30px rgba(40,12,8,.5)}
.v2 .card .n{display:block;margin-bottom:10px}

/* V3 ikonos kártyák */
.v3 .body{display:grid;gap:14px}
@media(min-width:680px){.v3 .body{grid-template-columns:1fr 1fr}}
.v3 .card{background:#fff;border-radius:12px;padding:26px;display:flex;gap:18px;align-items:flex-start;border:1px solid var(--line);transition:transform .25s}
.v3 .card:hover{transform:translateY(-4px)}
.v3 .ic{background:color-mix(in oklab,var(--accent) 12%,#fff);border-radius:12px;padding:12px;flex-shrink:0}

/* V4 nagy számozott sorok */
.v4 .body{border-top:1px solid var(--line)}
.v4 .row{display:grid;grid-template-columns:auto 1fr auto;gap:clamp(16px,3vw,40px);align-items:center;padding:clamp(20px,2.6vw,30px) 8px;border-bottom:1px solid var(--line);transition:.25s;position:relative}
.v4 .row .bn{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:clamp(2.2rem,4vw,3.2rem);color:color-mix(in oklab,var(--accent) 32%,transparent);line-height:1}
.v4 .row .arr{font-family:"Spline Sans Mono",monospace;color:var(--accent);opacity:0;transform:translateX(-8px);transition:.25s}
.v4 .row:hover{background:#fff;padding-left:18px;padding-right:18px;border-radius:10px}
.v4 .row:hover .bn{color:var(--accent)}
.v4 .row:hover .arr{opacity:1;transform:none}
.v4 .row p.d{margin-top:2px}

/* V5 kétoszlop sticky */
.v5 .body{display:grid;gap:clamp(24px,4vw,56px)}
@media(min-width:820px){.v5 .body{grid-template-columns:.8fr 1.2fr}}
.v5 .left .tagline{color:var(--sub);margin-top:14px;font-size:1rem;max-width:30ch}
.v5 .right{display:grid;gap:2px;border-top:1px solid var(--line)}
.v5 .i{display:flex;gap:18px;padding:22px 0;border-bottom:1px solid var(--line)}
.v5 .i .ic{flex-shrink:0}

/* V6 kontúr-keretes kártyák (hero keretre rímel) */
.v6 .body{display:grid;gap:16px}
@media(min-width:680px){.v6 .body{grid-template-columns:1fr 1fr}}
.v6 .card{position:relative;background:#fff;border:2px solid var(--accent);border-radius:8px;padding:26px;transition:transform .25s}
.v6 .card::before{content:"";position:absolute;top:-7px;right:-7px;width:46%;height:46%;border:2px solid color-mix(in oklab,var(--accent) 45%,transparent);border-radius:8px;z-index:-1}
.v6 .card:hover{transform:translateY(-4px)}
.v6 .card .n{display:block;margin-bottom:8px}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>Szolgáltatás-rész — ötletek</h1>
  <p>A te 4 szolgáltatásoddal, a terrakotta palettán. 6 elrendezés — válassz egyet.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy számot (01–06), és beépítem az igazi index.html szolgáltatás-szekciójába</footer>

<script>
const I={
  roller:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="13" height="6" rx="1.5"/><path d="M16 7h4v3h-6"/><path d="M11 10v2a1 1 0 0 1-1 1H9v7"/></svg>',
  brush:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 3.5l6 6-3.5 3.5-6-6z"/><path d="M11 7l-4.5 4.5c-1.6 1.6-2 4-1 6 2 1 4.4.6 6-1L16 12"/><path d="M5.5 17.5C4.5 18 4 19 4 20.5"/></svg>',
  wall:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="13" rx="1"/><path d="M4 8h16M9.5 3v13"/><path d="M8 16v3.5a2 2 0 0 0 4 0"/></svg>',
  door:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="1"/><path d="M5 21h14"/><circle cx="15.5" cy="12" r="1"/></svg>'
};
const S=[
  ['01','Lakásfestés','Belső falak, mennyezetek festése, glettelés, sarokerősítés — akár bútormozgatással is.',I.roller],
  ['02','Homlokzatfestés','Időjárásálló homlokzatfesték felhordása, repedések javítása, alapozás.',I.brush],
  ['03','Tapétázás','Papír és vinyl tapéták pontos illesztéssel, buborékmentes felhelyezéssel.',I.wall],
  ['04','Mázolás, felújítás','Ajtók, ablakok, korlátok mázolása, kisebb építőipari javítások egy kézből.',I.door],
];
const head=`<span class="eyebrow">Mivel segíthetek</span><h2>Festés-mázolás minden falra, amire szükség van.</h2>`;

const V={
 '01':{nm:'Lista (jelenlegi)',desc:'számozott 2 oszlop',cls:'v1',
   body:`<div class="body">${S.map(s=>`<div class="i"><span class="n">${s[0]}</span><div><h3>${s[1]}</h3><p class="d">${s[2]}</p></div></div>`).join('')}</div>`},
 '02':{nm:'Kártyás rács',desc:'emelkedő kártyák',cls:'v2',
   body:`<div class="body">${S.map(s=>`<div class="card"><span class="n">${s[0]}</span><h3>${s[1]}</h3><p class="d">${s[2]}</p></div>`).join('')}</div>`},
 '03':{nm:'Ikonos kártyák',desc:'festő-ikonokkal',cls:'v3',
   body:`<div class="body">${S.map(s=>`<div class="card"><span class="ic">${s[3]}</span><div><h3>${s[1]}</h3><p class="d">${s[2]}</p></div></div>`).join('')}</div>`},
 '04':{nm:'Nagy számozott sorok',desc:'hoverre kiemelődik',cls:'v4',
   body:`<div class="body">${S.map(s=>`<div class="row"><span class="bn">${s[0]}</span><div><h3>${s[1]}</h3><p class="d">${s[2]}</p></div><span class="arr">→</span></div>`).join('')}</div>`},
 '05':{nm:'Kétoszlop (sticky cím)',desc:'bal cím · jobb lista',cls:'v5',
   body:`<div class="body"><div class="left"><span class="eyebrow">Mivel segíthetek</span><h2>Festés-mázolás minden falra.</h2><p class="tagline">Egy kézből, tiszta munkával — a kis javításoktól a teljes homlokzatig.</p></div><div class="right">${S.map(s=>`<div class="i"><span class="ic">${s[3]}</span><div><h3>${s[1]}</h3><p class="d">${s[2]}</p></div></div>`).join('')}</div></div>`,noHead:true},
 '06':{nm:'Kontúr-keretes kártyák',desc:'a hero keretre rímel',cls:'v6',
   body:`<div class="body">${S.map(s=>`<div class="card"><span class="n">${s[0]}</span><h3>${s[1]}</h3><p class="d">${s[2]}</p></div>`).join('')}</div>`},
};

document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${v.noHead?'':head}${v.body}</div>
  </section>`).join('');
</script>
</body>
</html>
