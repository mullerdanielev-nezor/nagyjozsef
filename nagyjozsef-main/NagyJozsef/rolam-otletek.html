<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rólam szekció — ötletek</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#ffffff;--bg2:#eaece4;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.14)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:66ch}

.gallery{max-width:1240px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

.sec{background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(40px,5vw,64px) clamp(22px,3.5vw,46px);color:var(--head)}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
.sec h2{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(2rem,4vw,3.2rem);line-height:1.02;margin-top:12px}
.sec h2 em{font-style:normal;color:var(--accent)}
.lead{color:var(--sub);margin-top:18px;font-size:1.06rem;max-width:46ch}
.sign{margin-top:20px;font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.5rem;color:var(--head)}
.sign small{display:block;font-family:"Spline Sans Mono",monospace;font-size:.62rem;font-weight:400;letter-spacing:.16em;color:var(--label);text-transform:uppercase;margin-top:3px}
.ph{position:relative;overflow:hidden;border-radius:8px}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.note{position:absolute;left:10px;bottom:10px;z-index:2;font-family:"Spline Sans Mono",monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:rgba(40,12,8,.6);padding:5px 9px;border-radius:100px}
ul.vals{list-style:none;margin-top:22px;display:grid;gap:10px}
ul.vals li{display:flex;gap:10px;align-items:flex-start;color:var(--sub);font-size:.97rem}
ul.vals li b{color:var(--head)}
ul.vals svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;margin-top:3px}
.stat{display:inline-flex;flex-direction:column;background:var(--head);color:#fff;border-radius:10px;padding:14px 18px}
.stat .nn{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:2rem;line-height:1;color:#ffb59c}
.stat .ll{font-size:.74rem;font-weight:600;margin-top:3px}

/* A klasszikus kétoszlop */
.A .g{display:grid;gap:clamp(28px,5vw,64px);align-items:center}
@media(min-width:820px){.A .g{grid-template-columns:.9fr 1.1fr}}
.A .ph{aspect-ratio:4/5;border:3px solid var(--accent)}
.A .ph::before{content:"";position:absolute}

/* B sötét bordó panel */
.B .sec{background:var(--head);color:#fff}
.B .eyebrow{color:#ffb59c}.B .sec h2{color:#fff}.B .sec h2 em{color:#e8975f}.B .lead{color:rgba(255,255,255,.8)}
.B .sign{color:#fff}.B .sign small{color:#ffb59c}
.B .g{display:grid;gap:clamp(28px,5vw,60px);align-items:center}
@media(min-width:820px){.B .g{grid-template-columns:1.1fr .9fr}.B .ph{order:2}}
.B .ph{aspect-ratio:4/5;border:3px solid #ffb59c}

/* C nagy idézet + kerek portré */
.C .sec{text-align:center}
.C .portr{width:120px;height:120px;border-radius:50%;margin:0 auto 20px;border:3px solid var(--accent);overflow:hidden}
.C .pull{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(1.8rem,4vw,3rem);line-height:1.05;max-width:18ch;margin:10px auto 0;color:var(--head)}
.C .pull em{font-style:normal;color:var(--accent)}
.C .lead{margin:18px auto 0}.C .sign{display:inline-block}

/* D kártyás + stat */
.D .g{display:grid;gap:clamp(24px,4vw,50px);align-items:center}
@media(min-width:820px){.D .g{grid-template-columns:1fr 1.1fr}}
.D .card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line);box-shadow:0 24px 50px -34px rgba(40,12,8,.45);position:relative}
.D .card .ph{border-radius:0;aspect-ratio:4/3}
.D .card .stat{position:absolute;right:14px;bottom:14px}

/* E értéklistás */
.E .g{display:grid;gap:clamp(28px,5vw,60px);align-items:start}
@media(min-width:820px){.E .g{grid-template-columns:.95fr 1.05fr}}
.E .ph{aspect-ratio:1/1;border:3px solid var(--accent);position:sticky;top:20px}

/* F polaroid */
.F .g{display:grid;gap:clamp(28px,5vw,60px);align-items:center}
@media(min-width:820px){.F .g{grid-template-columns:.8fr 1.2fr}}
.F .pola{background:#fff;padding:14px 14px 50px;border-radius:3px;box-shadow:0 26px 50px -30px rgba(40,12,8,.5);transform:rotate(-2.5deg);max-width:320px}
.F .pola .ph{border-radius:1px;aspect-ratio:4/5}
.F .pola .sg{margin-top:12px;text-align:center;font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.3rem;color:var(--head)}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>„Rólam" szekció — ötletek</h1>
  <p>A bemutatkozó rész 6 elrendezése, terrakotta palettán. A portré most helykitöltő munkafotó — élesben cseréld le egy saját fényképedre. Válassz egyet.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (A–F), és beépítem az igazi index.html bemutatkozó szekciójába</footer>

<script>
const portrait='assets/1000010558-full.webp';
const eyebrow='<span class="eyebrow">Aki a munka mögött áll</span>';
const h2='<h2>Egyetlen ember,<br>az <em>első hívástól</em> a végéig.</h2>';
const lead='<p class="lead">Nagy József vagyok, egyéni vállalkozó szobafestő. Nem cégként dolgozom, ahol minden lépéshez más arc érkezik — én megyek ki Önhöz, én végzem el a munkát, és én veszem fel a telefont évek múlva is.</p>';
const sign='<div class="sign">Nagy József<small>egyéni vállalkozó · szobafestő</small></div>';
const check='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
const vals=`<ul class="vals">
  <li>${check}<div><b>Egy ember végig</b> — nincs alvállalkozó, nincs váltott csapat.</div></li>
  <li>${check}<div><b>Korrekt árajánlat</b> — világos ár, rejtett tételek nélkül.</div></li>
  <li>${check}<div><b>Tiszta munkaterület</b> — leterítve, bútorvédelemmel, festékfolt nélkül.</div></li>
  <li>${check}<div><b>Elérhető maradok</b> — engem hív közvetlenül, évek múlva is.</div></li>
</ul>`;
const photo=(cls='')=>`<div class="ph ${cls}"><img src="${portrait}" alt=""><span class="note">Fotó · cseréld le saját portréra</span></div>`;

const V={
 'A':{nm:'Klasszikus kétoszlop',desc:'kép + szöveg',cls:'A',
   html:`${eyebrow}<div class="g" style="margin-top:14px">${photo()}<div>${h2}${lead}${sign}</div></div>`,noTop:true},
 'B':{nm:'Sötét bordó panel',desc:'világos szöveg + kép',cls:'B',
   html:`<div class="g">${photo()}<div>${eyebrow}${h2}${lead}${sign}</div></div>`,noTop:true},
 'C':{nm:'Nagy idézet + kerek portré',desc:'központi, személyes',cls:'C',
   html:`<div class="portr"><img src="${portrait}" alt="" style="width:100%;height:100%;object-fit:cover"></div>${eyebrow}<div class="pull">„Én megyek ki, én festek, <em>és én állok mögötte.</em>"</div>${lead}<br>${sign}`,noTop:true},
 'D':{nm:'Kártyás + stat badge',desc:'fotó kártya · 10+ év',cls:'D',
   html:`${eyebrow}<div class="g" style="margin-top:14px"><div class="card"><div class="ph"><img src="${portrait}" alt=""></div><div class="stat"><span class="nn">10+</span><span class="ll">év tapasztalat</span></div></div><div>${h2}${lead}${sign}</div></div>`,noTop:true},
 'E':{nm:'Értéklistás',desc:'kép + pipás értékek',cls:'E',
   html:`${eyebrow}<div class="g" style="margin-top:14px">${photo()}<div>${h2}${vals}${sign}</div></div>`,noTop:true},
 'F':{nm:'Polaroid portré',desc:'személyes, kézműves',cls:'F',
   html:`<div class="g"><div class="pola"><div class="ph"><img src="${portrait}" alt=""></div><div class="sg">Nagy József</div></div><div>${eyebrow}${h2}${lead}</div></div>`,noTop:true},
};

document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${v.html}</div>
  </section>`).join('');
</script>
</body>
</html>
