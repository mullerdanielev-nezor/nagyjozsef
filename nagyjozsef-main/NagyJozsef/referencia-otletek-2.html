<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Referencia szekció — újabb ötletek</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#ffffff;--bg2:#eaece4;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.14)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}

.gallery{max-width:1240px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

.sec{background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(36px,4vw,56px) clamp(22px,3.5vw,46px);color:var(--head);overflow:hidden}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
.sec h2{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(1.9rem,3.6vw,2.9rem);line-height:1.02;margin-top:12px;max-width:22ch}
.body{margin-top:clamp(26px,3.2vw,40px)}
.ph{position:relative;overflow:hidden;border-radius:10px}
.ph img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .55s}
.cap{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:16px;color:#fff;background:linear-gradient(180deg,transparent 40%,rgba(40,12,8,.82))}
.cap .pl{font-family:"Spline Sans Mono",monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:#ffc7b3}
.cap .t{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.15rem;margin-top:2px}

/* G szűrhető galéria */
.G .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.G .tabs button{font-family:"Spline Sans Mono",monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-radius:100px;border:1px solid var(--line);background:#fff;color:var(--head);cursor:pointer;transition:.18s}
.G .tabs button.on,.G .tabs button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.G .grid{display:grid;gap:12px;grid-template-columns:repeat(2,1fr)}
@media(min-width:760px){.G .grid{grid-template-columns:repeat(3,1fr)}}
.G .g{aspect-ratio:4/3}.G .g .ph{aspect-ratio:4/3}.G .g:hover .ph img{transform:scale(1.06)}
.G .g.hide{display:none}

/* H teljes szélességű váltakozó sávok */
.H .band{display:grid;gap:0;align-items:center;margin:0 calc(-1*clamp(22px,3.5vw,46px))}
.H .band+.band{margin-top:18px}
@media(min-width:780px){.H .band{grid-template-columns:1.4fr 1fr}.H .band:nth-child(even) .ph{order:2}}
.H .ph{border-radius:0;aspect-ratio:16/10}
.H .tx{padding:clamp(24px,4vw,50px)}
.H .tx .pl{font-family:"Spline Sans Mono",monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--label)}
.H .tx h3{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(1.7rem,3vw,2.4rem);margin:6px 0 8px;color:var(--head)}
.H .tx p{color:var(--sub);max-width:38ch}

/* I statisztika + fotócsík */
.I .stats{display:flex;flex-wrap:wrap;gap:clamp(20px,5vw,60px);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:22px 0;margin-bottom:18px}
.I .stats .it .nnum{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:2.6rem;line-height:1;color:var(--accent)}
.I .stats .it .l{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--sub);margin-top:4px}
.I .strip{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px}
.I .strip .g{flex:0 0 230px;scroll-snap-align:start}.I .strip .ph{aspect-ratio:4/3}

/* J polaroid fal */
.J .wall{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;padding:10px 0}
.J .pola{background:#fff;padding:10px 10px 34px;border-radius:3px;box-shadow:0 22px 44px -26px rgba(40,12,8,.5);width:min(45%,220px)}
.J .pola:nth-child(odd){transform:rotate(-2.5deg)}.J .pola:nth-child(even){transform:rotate(2deg)}
.J .pola:hover{transform:rotate(0) scale(1.03);transition:transform .3s;z-index:2}
.J .pola .ph{border-radius:1px;aspect-ratio:1/1}
.J .pola .sign{margin-top:8px;text-align:center;font-family:"Spline Sans Mono",monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--label)}

/* K magazin számozott sorok */
.K .row{display:grid;grid-template-columns:auto 120px 1fr;gap:clamp(14px,3vw,32px);align-items:center;padding:18px 0;border-top:1px solid var(--line)}
.K .row:last-child{border-bottom:1px solid var(--line)}
.K .row .bn{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:clamp(2rem,3.6vw,3rem);color:color-mix(in oklab,var(--accent) 35%,transparent);line-height:1}
.K .row .ph{aspect-ratio:4/3}
.K .row h3{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.3rem}
.K .row p{color:var(--sub);font-size:.92rem;margin-top:2px}
@media(max-width:560px){.K .row{grid-template-columns:auto 1fr}.K .row .ph{display:none}}

/* L oszlopos masonry */
.L .body{columns:2;column-gap:12px}
@media(min-width:760px){.L .body{columns:3}}
.L .g{break-inside:avoid;margin-bottom:12px}
.L .g:hover .ph img{transform:scale(1.05)}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>Referencia szekció — újabb ötletek</h1>
  <p>Másik 6 elrendezés, az előzőektől eltérő. A G szűrhető (kattints a fülekre), az I és C görgethető.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (G–L), és beépítem az igazi index.html referencia-szekciójába</footer>

<script>
const P=[
  ['assets/1000010639-full.webp','Hálószoba · Budapest','Hangsúlyfal','lakas'],
  ['assets/1000010531-full.webp','Nappali','Falfelújítás','lakas'],
  ['assets/1000010558-full.webp','Fürdőszoba','Pasztell tónus','lakas'],
  ['assets/1000010596-full.webp','Családi ház','Homlokzat','homlokzat'],
  ['assets/1000010597-full.webp','Konyha','Mázolás','mazolas'],
  ['assets/1000010636-full.webp','Dekorfal','Tapéta','tapeta'],
];
const head=`<span class="eyebrow">Válogatott munkák</span><h2>Referenciák — falak, amiket újra megszerettek.</h2>`;
const tile=p=>`<div class="g" data-cat="${p[3]}"><div class="ph"><img src="${p[0]}" alt=""></div><div class="cap"><div class="pl">${p[1]}</div><div class="t">${p[2]}</div></div></div>`;

const V={
 'G':{nm:'Szűrhető galéria',desc:'kategória-fülek',cls:'G',
   body:`<div class="tabs"><button class="on" data-f="mind">Mind</button><button data-f="lakas">Lakásfestés</button><button data-f="homlokzat">Homlokzat</button><button data-f="tapeta">Tapéta</button><button data-f="mazolas">Mázolás</button></div><div class="grid">${P.map(tile).join('')}</div>`},
 'H':{nm:'Teljes szélességű sávok',desc:'váltakozó kép-szöveg',cls:'H',
   body:P.slice(0,3).map(p=>`<div class="band"><div class="ph"><img src="${p[0]}" alt=""></div><div class="tx"><div class="pl">${p[1]}</div><h3>${p[2]}</h3><p>Festés-mázolás tiszta vonalvezetéssel, korrekt árajánlattal — az átadáskor minden a helyén.</p></div></div>`).join('')},
 'I':{nm:'Statisztika + fotócsík',desc:'számok + görgető',cls:'I',
   body:`<div class="stats"><div class="it"><div class="nnum">200+</div><div class="l">befejezett munka</div></div><div class="it"><div class="nnum">10+</div><div class="l">év tapasztalat</div></div><div class="it"><div class="nnum">100%</div><div class="l">ajánlás</div></div></div><div class="strip">${P.map(tile).join('')}</div>`},
 'J':{nm:'Polaroid fal',desc:'szétszórt, megdöntött',cls:'J',
   body:`<div class="wall">${P.map(p=>`<div class="pola"><div class="ph"><img src="${p[0]}" alt=""></div><div class="sign">${p[2]} · ${p[1]}</div></div>`).join('')}</div>`},
 'K':{nm:'Magazin számozott sorok',desc:'nagy szám + thumb',cls:'K',
   body:P.map((p,i)=>`<div class="row"><span class="bn">${String(i+1).padStart(2,'0')}</span><div class="ph"><img src="${p[0]}" alt=""></div><div><h3>${p[2]}</h3><p>${p[1]} — tiszta munka, korrekt árajánlat.</p></div></div>`).join('')},
 'L':{nm:'Oszlopos masonry',desc:'Pinterest-szerű',cls:'L',
   body:`<div class="body" style="margin-top:0">${P.map((p,i)=>`<div class="g"><div class="ph" style="aspect-ratio:${i%3===0?'3/4':i%3===1?'4/3':'1/1'}"><img src="${p[0]}" alt=""></div><div class="cap" style="position:static;background:none;color:var(--head);padding:8px 2px"><div class="pl" style="color:var(--label)">${p[1]}</div></div></div>`).join('')}</div>`},
};

document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${head}${v.cls==='L'?v.body:`<div class="body">${v.body}</div>`}</div>
  </section>`).join('');

// G filter
document.querySelectorAll('.G .tabs button').forEach(b=>{
  b.addEventListener('click',()=>{
    const sec=b.closest('.G');
    sec.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const f=b.dataset.f;
    sec.querySelectorAll('.g').forEach(g=>g.classList.toggle('hide', f!=='mind' && g.dataset.cat!==f));
  });
});
</script>
</body>
</html>
