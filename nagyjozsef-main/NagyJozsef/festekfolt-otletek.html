<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Festékfolt háttér — opciók</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#fbf8f2;--bg2:#f1ede3;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}

.gallery{max-width:1180px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:28px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:13px 20px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.3rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:.98rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.6rem;letter-spacing:.04em;color:#b09a95;text-transform:uppercase}

.demo{position:relative;overflow:hidden;min-height:240px;display:flex;align-items:center;background:linear-gradient(125deg,var(--bg1),var(--bg2));color:var(--head)}
.blob{position:absolute;inset:0;z-index:0;pointer-events:none;color:var(--accent)}
.blob svg{position:absolute}
.in{position:relative;z-index:2;padding:34px clamp(24px,4vw,54px);max-width:32ch}
.in .ey{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.66rem;letter-spacing:.24em;color:var(--label)}
.in .h{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:1.6rem;margin-top:6px}
.in p{color:var(--sub);margin-top:6px;font-size:.93rem}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>Festékfolt a szekciók szélére</h1>
  <p>Háttér-foltok a szekciók szélén, halványan, terrakotta színben. 6 stílus — válassz egyet (vagy többet különböző szekciókhoz).</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy számot (01–06), és beépítem a szekciók szélére az igazi index.html-en</footer>

<script>
/* organikus folt path-ek */
const blobA=`<svg width="360" height="360" viewBox="-100 -100 200 200"><path fill="currentColor" d="M46,-63 C62,-52 78,-36 80,-17 C82,2 70,23 55,40 C40,57 22,70 0,72 C-22,74 -45,66 -60,50 C-75,34 -82,10 -78,-13 C-74,-36 -59,-58 -38,-68 C-17,-78 10,-74 46,-63 Z"/></svg>`;
const blobB=`<svg width="300" height="300" viewBox="-100 -100 200 200"><path fill="currentColor" d="M52,-58 C66,-44 72,-22 70,-2 C68,18 58,38 42,52 C26,66 4,74 -18,70 C-40,66 -62,50 -72,28 C-82,6 -80,-22 -66,-42 C-52,-62 -26,-74 -2,-76 C22,-78 38,-72 52,-58 Z"/></svg>`;

const D={
 '01':['Lágy folt (sarok)','elmosott radial · jobb felső',
   `<div class="blob" style="background:radial-gradient(36% 60% at 92% 8%, color-mix(in oklab,var(--accent) 26%,transparent), transparent 70%)"></div>`],
 '02':['Organikus folt (bal szél)','éles festékfolt · bal',
   `<div class="blob" style="opacity:.16"><div style="position:absolute;left:-130px;top:50%;transform:translateY(-50%)">${blobA}</div></div>`],
 '03':['Festék-fröccs + cseppek','folt apró cseppekkel · jobb alsó',
   `<div class="blob" style="opacity:.16"><div style="position:absolute;right:-90px;bottom:-90px">${blobB}</div><svg width="180" height="120" viewBox="0 0 180 120" style="right:120px;bottom:8px"><circle cx="30" cy="80" r="9" fill="currentColor"/><circle cx="70" cy="50" r="6" fill="currentColor"/><circle cx="110" cy="90" r="4" fill="currentColor"/><circle cx="95" cy="30" r="3" fill="currentColor"/><circle cx="140" cy="60" r="7" fill="currentColor"/></svg></div>`],
 '04':['Nagy féloldalas folt','jobb szélből benyúló nagy folt',
   `<div class="blob" style="opacity:.12"><div style="position:absolute;right:-180px;top:50%;transform:translateY(-50%) scale(1.7)">${blobB}</div></div>`],
 '05':['Szórt pöttyök','festékpöttyök a sarokban',
   `<div class="blob" style="opacity:.5"><svg width="240" height="160" viewBox="0 0 240 160" style="right:0;top:0"><circle cx="200" cy="30" r="10" fill="currentColor"/><circle cx="150" cy="20" r="5" fill="currentColor"/><circle cx="210" cy="80" r="6" fill="currentColor"/><circle cx="170" cy="70" r="3.5" fill="currentColor"/><circle cx="120" cy="55" r="4" fill="currentColor"/><circle cx="225" cy="120" r="4" fill="currentColor"/></svg></div>`],
 '06':['Ecsetnyom (kenődő)','vízszintes ecsethúzás a szélen',
   `<div class="blob" style="opacity:.16"><svg width="380" height="80" viewBox="0 0 380 80" style="right:-40px;bottom:18px"><path fill="currentColor" d="M10,40 C60,18 120,16 180,30 C230,42 300,38 360,22 C372,18 378,30 366,38 C300,62 220,64 160,52 C110,42 60,46 18,58 C6,62 0,46 10,40 Z"/></svg></div>`],
};

document.getElementById('gallery').innerHTML=Object.entries(D).map(([id,d])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${d[0]}</span><span class="desc">${d[1]}</span></div>
    <div class="demo">${d[2]}<div class="in"><div class="ey">Mivel segíthetek</div><div class="h">Szolgáltatások</div><p>Festés-mázolás minden falra, amire szükség van.</p></div></div>
  </section>`).join('');
</script>
</body>
</html>
