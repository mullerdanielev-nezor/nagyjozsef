<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rólam szekció — egyedi elrendezések</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#ffffff;--bg2:#eaece4;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.14)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:66ch}

.gallery{max-width:1280px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

/* base section with festékes háttér */
.sec{position:relative;overflow:hidden;padding:clamp(48px,6vw,80px) clamp(24px,4vw,56px);color:var(--head);
  background:linear-gradient(125deg,var(--bg1),var(--bg2))}
.deco{position:absolute;inset:0;z-index:0;pointer-events:none}
/* festékes paletta-csík halványan */
.deco .strip{position:absolute;top:0;bottom:0;right:0;width:clamp(16px,2vw,34px);opacity:.5;background:linear-gradient(var(--bg2) 0 25%,color-mix(in oklab,var(--accent) 60%,#fff) 25% 50%,var(--accent) 50% 75%,var(--head) 75% 100%)}
/* festékes blobok */
.deco .blob{position:absolute;border-radius:50%;filter:blur(2px)}
.in{position:relative;z-index:2}

.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
h2.t{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(2.1rem,4.4vw,3.6rem);line-height:1.0;margin-top:12px}
h2.t em{font-style:normal;color:var(--accent)}
.lead{color:var(--sub);margin-top:18px;font-size:1.07rem;max-width:46ch}
.sign{margin-top:22px;font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.6rem;color:var(--head)}
.sign small{display:block;font-family:"Spline Sans Mono",monospace;font-size:.62rem;font-weight:400;letter-spacing:.16em;color:var(--label);text-transform:uppercase;margin-top:4px}
.ph{position:relative;overflow:hidden}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.note{position:absolute;left:10px;bottom:10px;z-index:3;font-family:"Spline Sans Mono",monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:rgba(40,12,8,.6);padding:5px 9px;border-radius:100px}
.stat{display:inline-flex;flex-direction:column;background:var(--head);color:#fff;border-radius:12px;padding:16px 20px}
.stat .nn{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:2.2rem;line-height:1;color:#ffb59c}
.stat .ll{font-size:.74rem;font-weight:600;margin-top:3px}

/* G átlós hasítás */
.G .in{display:grid;gap:clamp(26px,4vw,56px);align-items:center}
@media(min-width:840px){.G .in{grid-template-columns:1fr 1fr}}
.G .ph{aspect-ratio:4/5;border-radius:10px;clip-path:polygon(0 0,100% 0,100% 88%,0 100%);box-shadow:0 36px 64px -38px rgba(40,12,8,.5)}
.G .deco .blob{width:340px;height:340px;left:-90px;top:-90px;background:color-mix(in oklab,var(--accent) 16%,transparent)}

/* H bordó panel + óriás szám */
.H .sec{background:var(--head);color:#fff}
.H .eyebrow{color:#ffb59c}.H h2.t{color:#fff}.H h2.t em{color:#e8975f}.H .lead{color:rgba(255,255,255,.82)}
.H .sign{color:#fff}.H .sign small{color:#ffb59c}
.H .bignum{position:absolute;right:2%;bottom:-8%;z-index:0;font-family:"Big Shoulders Display",sans-serif;font-weight:900;font-size:24rem;line-height:.8;color:rgba(255,181,156,.10)}
.H .in{display:grid;gap:clamp(26px,4vw,56px);align-items:center}
@media(min-width:840px){.H .in{grid-template-columns:1fr 1fr}.H .ph{order:2}}
.H .ph{aspect-ratio:4/5;border-radius:10px;border:3px solid #ffb59c}
.H .deco .strip{opacity:.22}

/* I editorial watermark név */
.I .sec{text-align:center}
.I .water{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);z-index:0;font-family:"Big Shoulders Display",sans-serif;font-weight:900;font-size:clamp(4rem,16vw,13rem);line-height:.8;color:transparent;-webkit-text-stroke:2px color-mix(in oklab,var(--accent) 22%,transparent);text-transform:uppercase;white-space:nowrap}
.I .portr{width:150px;height:150px;border-radius:50%;margin:0 auto 18px;border:3px solid var(--accent);overflow:hidden}
.I .pull{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(1.9rem,4vw,3rem);line-height:1.04;max-width:20ch;margin:0 auto;color:var(--head)}
.I .pull em{font-style:normal;color:var(--accent)}
.I .lead{margin:16px auto 0}.I .sign{display:inline-block}

/* J magazin spread full-bleed kép */
.J .sec{padding:0}
.J .in{display:grid;align-items:stretch}
@media(min-width:840px){.J .in{grid-template-columns:1fr 1fr}}
.J .ph{min-height:420px}
.J .txt{padding:clamp(40px,5vw,72px);display:flex;flex-direction:column;justify-content:center}
.J .deco .strip{left:0;right:auto;opacity:.45}

/* K collage rács */
.K .in{display:grid;gap:16px;grid-template-columns:1fr}
@media(min-width:760px){.K .in{grid-template-columns:1.1fr .9fr;grid-template-rows:auto auto}}
.K .main{grid-row:span 2}.K .main .ph{aspect-ratio:3/4;height:100%;border-radius:12px;border:3px solid var(--accent)}
.K .qcard{background:#fff;border-radius:12px;padding:24px;border:1px solid var(--line);box-shadow:0 20px 44px -32px rgba(40,12,8,.4)}
.K .qcard blockquote{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.5rem;line-height:1.05;color:var(--head)}
.K .qcard blockquote em{font-style:normal;color:var(--accent)}
.K .qcard .by{margin-top:10px;font-family:"Spline Sans Mono",monospace;font-size:.64rem;letter-spacing:.1em;color:var(--sub)}
.K .scard{background:var(--head);color:#fff;border-radius:12px;padding:24px;display:flex;align-items:center;gap:18px}
.K .scard .nn{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:3rem;line-height:1;color:#ffb59c}
.K .scard .ll{font-size:.92rem;font-weight:600}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>„Rólam" — egyedi elrendezések</h1>
  <p>Igényesebb, egyedi felépítésű bemutatkozó szekciók — a festékes elem (paletta-csík / festékfolt) a háttérben. A portré helykitöltő munkafotó; élesben saját fényképpel.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (G–K), és beépítem az igazi index.html bemutatkozó szekciójába</footer>

<script>
const portrait='assets/1000010558-full.webp';
const eyebrow='<span class="eyebrow">Aki a munka mögött áll</span>';
const h2='<h2 class="t">Egyetlen ember,<br>az <em>első hívástól</em> a végéig.</h2>';
const lead='<p class="lead">Nagy József vagyok, egyéni vállalkozó szobafestő. Én megyek ki Önhöz, én végzem el a munkát, és én veszem fel a telefont évek múlva is. Nincs alvállalkozó, nincs váltott csapat.</p>';
const sign='<div class="sign">Nagy József<small>egyéni vállalkozó · szobafestő</small></div>';
const photo='<div class="ph"><img src="'+portrait+'" alt=""><span class="note">Fotó · cseréld saját portréra</span></div>';

const V={
 'G':{nm:'Átlós hasítás',desc:'ferde vágott portré + festékfolt',cls:'G',
   deco:'<div class="deco"><span class="blob"></span><span class="strip"></span></div>',
   html:`${photo}<div>${eyebrow}${h2}${lead}${sign}</div>`},
 'H':{nm:'Bordó panel + óriás szám',desc:'sötét, „10+" háttérszám',cls:'H',
   deco:'<div class="deco"><span class="strip"></span></div><div class="bignum">10+</div>',
   html:`<div>${eyebrow}${h2}${lead}${sign}</div><div class="ph"><img src="${portrait}" alt=""><span class="note">Fotó · cseréld saját portréra</span></div>`},
 'I':{nm:'Editorial watermark név',desc:'háttérben óriás NAGY JÓZSEF',cls:'I',
   deco:'<div class="deco"><span class="water">NAGY JÓZSEF</span></div>',
   html:`<div class="portr"><img src="${portrait}" style="width:100%;height:100%;object-fit:cover" alt=""></div>${eyebrow}<div class="pull">„Én megyek ki, én festek, <em>és én állok mögötte.</em>"</div>${lead}<br>${sign}`},
 'J':{nm:'Magazin spread',desc:'teljes magasságú kép + szövegoszlop',cls:'J',
   deco:'<div class="deco"><span class="strip"></span></div>',
   html:`<div class="ph"><img src="${portrait}" alt=""><span class="note">Fotó · cseréld saját portréra</span></div><div class="txt">${eyebrow}${h2}${lead}${sign}</div>`},
 'K':{nm:'Kollázs rács',desc:'portré + idézet-kártya + stat',cls:'K',
   deco:'<div class="deco"><span class="strip" style="opacity:.4"></span></div>',
   html:`<div class="main"><div class="ph"><img src="${portrait}" alt=""><span class="note">Fotó · cseréld saját portréra</span></div></div><div class="qcard"><blockquote>„Nincs ügyfélszolgálat. <em>Csak az ember,</em> aki ott áll az otthonában."</blockquote><div class="by">— Nagy József</div></div><div class="scard"><span class="nn">10+</span><span class="ll">év tapasztalat<br>festés-mázolásban</span></div>`},
};

document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${v.deco||''}<div class="in">${v.html}</div></div>
  </section>`).join('');
</script>
</body>
</html>
