<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vélemények — szekció ötletek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#fbf7ef;--bg2:#f2ece1;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--gold:#c98a3a;--line:rgba(63,23,23,.16)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}
.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}
.gallery{max-width:1240px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}
.sec{background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(40px,5vw,64px) clamp(24px,4vw,54px);color:var(--head)}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
h2{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(1.9rem,3.6vw,2.9rem);line-height:1.02;margin-top:12px;max-width:20ch}
.body{margin-top:clamp(30px,4vw,46px)}
.st{color:var(--gold);letter-spacing:2px;font-size:.95rem}
.q{color:var(--head)}
.by{font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.06em;color:var(--sub);text-transform:uppercase}

/* A kártyás rács */
.A .body{display:grid;gap:16px}
@media(min-width:760px){.A .body{grid-template-columns:repeat(3,1fr)}}
.A .card{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--line);box-shadow:0 18px 40px -32px rgba(40,12,8,.4)}
.A .card .q{font-size:1.05rem;line-height:1.4;margin:10px 0 14px}

/* B nagy kiemelt + kisebbek */
.B .body{display:grid;gap:16px}
@media(min-width:820px){.B .body{grid-template-columns:1.4fr 1fr;align-items:stretch}}
.B .feat{background:var(--head);color:#fff;border-radius:16px;padding:clamp(26px,3.4vw,40px);display:flex;flex-direction:column;justify-content:center}
.B .feat .q{color:#fff;font-family:"Big Shoulders Display";font-weight:700;text-transform:uppercase;font-size:clamp(1.5rem,2.6vw,2.1rem);line-height:1.1;margin:12px 0 16px}
.B .feat .by{color:#ffb59c}.B .feat .st{color:#ffce7a}
.B .side{display:grid;gap:16px}
.B .side .card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--line)}
.B .side .card .q{font-size:.98rem;margin:8px 0 10px}

/* C kép + idézet váltakozó */
.C .body{display:grid;gap:clamp(22px,4vw,46px)}
.C .row{display:grid;gap:clamp(20px,4vw,42px);align-items:center}
@media(min-width:760px){.C .row{grid-template-columns:0.8fr 1.2fr}.C .row:nth-child(even) .rimg{order:2}}
.C .rimg{aspect-ratio:4/3;border-radius:10px;overflow:hidden;box-shadow:0 26px 50px -36px rgba(40,12,8,.45)}
.C .rimg img{width:100%;height:100%;object-fit:cover}
.C .q{font-family:"Big Shoulders Display";font-weight:700;text-transform:uppercase;font-size:clamp(1.4rem,2.6vw,2rem);line-height:1.12;margin:10px 0 12px}

/* D carousel */
.D .body{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:10px}
.D .card{flex:0 0 min(78vw,360px);scroll-snap-align:start;background:#fff;border-radius:14px;padding:26px;border:1px solid var(--line);box-shadow:0 18px 40px -32px rgba(40,12,8,.4)}
.D .card .q{font-size:1.05rem;line-height:1.4;margin:10px 0 14px}
.D .hint{margin-top:8px;font-family:"Spline Sans Mono",monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sub)}

/* E masonry fal */
.E .body{columns:3;column-gap:16px}
@media(max-width:760px){.E .body{columns:2}}
@media(max-width:460px){.E .body{columns:1}}
.E .card{break-inside:avoid;margin-bottom:16px;background:#fff;border-radius:12px;padding:22px;border:1px solid var(--line)}
.E .card .q{margin:8px 0 10px}

/* F nagy idézőjel középen */
.F{text-align:center}.F .body{max-width:760px;margin:0 auto}
.F .mark{font-family:"Big Shoulders Display";font-weight:900;font-size:6rem;line-height:.5;color:color-mix(in oklab,var(--accent) 35%,transparent)}
.F .q{font-family:"Big Shoulders Display";font-weight:700;text-transform:uppercase;font-size:clamp(1.8rem,4vw,3rem);line-height:1.08;margin:6px auto 16px}
.F .dots{display:flex;justify-content:center;gap:8px;margin-top:20px}
.F .dots i{width:9px;height:9px;border-radius:50%;background:color-mix(in oklab,var(--accent) 35%,transparent)}.F .dots i.on{background:var(--accent)}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>
<header class="pagehead">
  <h1>Vélemények — szekció ötletek</h1>
  <p>6 elrendezés a véleményekhez. A szövegek demók — élesben valódi értékelésekre cseréljük. Válassz egyet.</p>
</header>
<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (A–F), és beépítem az igazi index.html vélemény-szekciójába</footer>
<script>
const R=[
 ['Tiszta, precíz munka, és pontosan annyiba került, amennyit megbeszéltünk.','K. Anna · Nyírlugos','assets/1000010558-full.webp'],
 ['Évek óta őt hívom, mindig megbízható. A homlokzat újra olyan, mint új korában.','T. Gábor · Nyírbátor','assets/1000010596-full.webp'],
 ['Gyors, korrekt, és a végén egy festékfolt sem volt a parkettán.','Sz. Réka · Debrecen','assets/1000010639-full.webp'],
 ['Egy emberrel beszéltem az elejétől a végéig. Ez ma ritkaság.','N. Péter · Nyíradony','assets/1000010531-full.webp'],
];
const head=`<span class="eyebrow">Az ő szavaikkal</span><h2>Minden vélemény egy szoba, ami megváltozott.</h2>`;
const card=(r,cls='card')=>`<div class="${cls}"><div class="st">★★★★★</div><p class="q">„${r[0]}"</p><div class="by">${r[1]}</div></div>`;

const V={
 'A':{nm:'Idézet-kártyák rács',desc:'3 kártya csillaggal',cls:'A',body:`<div class="body">${R.slice(0,3).map(r=>card(r)).join('')}</div>`},
 'B':{nm:'Nagy kiemelt + kisebbek',desc:'1 fő + 2 mellék',cls:'B',body:`<div class="body"><div class="feat"><div class="st">★★★★★</div><p class="q">„${R[0][0]}"</p><div class="by">${R[0][1]}</div></div><div class="side">${R.slice(1,3).map(r=>card(r)).join('')}</div></div>`},
 'C':{nm:'Kép + idézet váltakozó',desc:'fotóval, zigzag',cls:'C',body:`<div class="body">${R.slice(0,3).map(r=>`<div class="row"><div class="rimg"><img src="${r[2]}" alt=""></div><div><div class="st">★★★★★</div><p class="q">„${r[0]}"</p><div class="by">${r[1]}</div></div></div>`).join('')}</div>`},
 'D':{nm:'Carousel',desc:'oldalra görgethető',cls:'D',body:`<div class="body">${R.map(r=>card(r)).join('')}</div><div class="hint">← húzd oldalra →</div>`},
 'E':{nm:'Masonry fal',desc:'változó magasságú',cls:'E',body:`<div class="body">${R.concat([R[0],R[2]]).map(r=>card(r)).join('')}</div>`},
 'F':{nm:'Nagy idézőjel (lapozható)',desc:'egy idézet középen',cls:'F',body:`<div class="body"><div class="mark">&bdquo;</div><p class="q">${R[0][0]}</p><div class="by">${R[0][1]}</div><div class="dots"><i class="on"></i><i></i><i></i><i></i></div></div>`},
};
document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${head}${v.body}</div>
  </section>`).join('');
</script>
</body>
</html>
