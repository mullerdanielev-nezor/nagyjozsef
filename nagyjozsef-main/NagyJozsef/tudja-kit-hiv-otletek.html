<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>„Tudja, kit hív" — szekció ötletek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#f4efe6;--bg2:#eae2d4;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--btn:#1a1a1a;--line:rgba(63,23,23,.16)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}
.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}
.gallery{max-width:1200px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}
.sec{position:relative;overflow:hidden;background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(40px,5vw,68px) clamp(24px,4vw,54px);color:var(--head)}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
.big{font-family:"Big Shoulders Display",sans-serif;font-weight:900;text-transform:uppercase;line-height:.92;color:var(--head)}
.big em{font-style:normal;color:var(--accent)}
.sub{color:var(--sub);max-width:44ch}
.portr{border-radius:50%;border:4px solid var(--accent);overflow:hidden;box-shadow:0 30px 56px -32px rgba(40,12,8,.5)}
.portr img{width:100%;height:100%;object-fit:cover;display:block}
.phone{display:inline-flex;align-items:center;gap:12px;text-decoration:none;background:var(--btn);color:#fff;border-radius:100px;padding:16px 26px 16px 16px}
.phone .ring{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center}
.phone .ring svg{width:19px;height:19px;color:#fff}
.phone .lab{font-family:"Spline Sans Mono",monospace;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:#e6b9a6}
.phone .num{font-family:"Spline Sans Mono",monospace;font-size:1rem;font-weight:700}
.check{display:flex;align-items:flex-start;gap:10px;color:var(--sub)}
.check svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;margin-top:3px}
.check b{color:var(--head)}

/* A nagy felirat központi */
.A{text-align:center}
.A .portr{width:clamp(120px,16vw,160px);aspect-ratio:1/1;margin:0 auto 18px}
.A .big{font-size:clamp(2.6rem,7vw,5.2rem);margin-top:6px}
.A .sub{margin:16px auto 0}.A .phone{margin-top:24px}

/* B kontakt-kártya */
.B .card{background:#fff;border-radius:18px;border:1px solid var(--line);box-shadow:0 26px 54px -38px rgba(40,12,8,.45);display:grid;overflow:hidden;max-width:760px;margin:0 auto}
@media(min-width:680px){.B .card{grid-template-columns:.8fr 1.2fr}}
.B .card .pic{min-height:230px}.B .card .pic img{width:100%;height:100%;object-fit:cover;display:block}
.B .card .info{padding:clamp(24px,3vw,36px);display:flex;flex-direction:column;justify-content:center}
.B .big{font-size:1.9rem}.B .sub{margin:8px 0 16px}.B .phone{align-self:flex-start}

/* C összehasonlító */
.C{text-align:center}
.C .big{font-size:clamp(2rem,5vw,3.4rem)}
.C .cols{display:grid;gap:16px;margin:26px auto 0;max-width:760px}
@media(min-width:640px){.C .cols{grid-template-columns:1fr 1fr}}
.C .col{border-radius:14px;padding:24px;text-align:left}
.C .col.bad{background:#fff;border:1px solid var(--line)}
.C .col.good{background:var(--head);color:#fff}
.C .col h3{font-family:"Big Shoulders Display";font-weight:800;text-transform:uppercase;font-size:1.3rem;margin-bottom:12px}
.C .col.good h3{color:#ffb59c}
.C .li{display:flex;gap:10px;align-items:flex-start;margin-top:8px;font-size:.94rem;color:var(--sub)}
.C .col.good .li{color:rgba(255,255,255,.85)}
.C .li .x{color:#b06a5a}.C .li .v{color:#ffb59c}
.C .phone{margin-top:24px}

/* D split portré + üzenet */
.D .g{display:grid;gap:clamp(26px,4vw,56px);align-items:center}
@media(min-width:780px){.D .g{grid-template-columns:.8fr 1.2fr}}
.D .portr{width:100%;aspect-ratio:4/5;border-radius:14px}
.D .big{font-size:clamp(2.2rem,4.6vw,3.4rem)}
.D .checks{display:grid;gap:10px;margin:16px 0 18px}

/* E idézet-fókusz + telefon */
.E{text-align:center}
.E .quote{font-family:"Big Shoulders Display";font-weight:700;text-transform:uppercase;font-size:clamp(2rem,5vw,3.6rem);line-height:1.04;max-width:18ch;margin:10px auto 0;color:var(--head)}
.E .quote em{font-style:normal;color:var(--accent)}
.E .row{display:flex;gap:16px;align-items:center;justify-content:center;margin-top:24px;flex-wrap:wrap}
.E .mini{width:60px;height:60px;border-radius:50%;border:3px solid var(--accent);overflow:hidden}
.E .mini img{width:100%;height:100%;object-fit:cover}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>
<header class="pagehead">
  <h1>„Tudja, kit hív" — szekció ötletek</h1>
  <p>A személyes üzenet: egy embert hív, és tudja, ki veszi fel. 5 elrendezés — válassz egyet. A portré a saját képed.</p>
</header>
<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (A–E), és beépítem az igazi index.html-be</footer>
<script>
const P='assets/nagy-jozsef.png';
const phoneIcon=`<svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M70 30c10 0 18 24 18 32s-12 14-12 22c0 16 38 54 54 54 8 0 14-12 22-12s32 8 32 18c0 16-14 32-32 32-44 0-104-60-104-104 0-18 16-32 22-42z"/></svg>`;
const phone=`<a class="phone" href="tel:+36706039556"><span class="ring">${phoneIcon}</span><span><span class="lab">Hívjon most</span><br><span class="num">06 70 603 9556</span></span></a>`;
const chk=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;

const V={
 'A':{nm:'Nagy felirat központi',desc:'portré + felirat + telefon',cls:'A',
   html:`<div class="portr"><img src="${P}" alt=""></div><span class="eyebrow">Nincs ügyfélszolgálat</span><div class="big">Tudja, <em>kit hív.</em></div><p class="sub">Engem ér el közvetlenül — nem egy központot. Ugyanaz az ember a felméréstől a kész falig, és évek múlva is.</p>${phone}`},
 'B':{nm:'Kontakt-kártya',desc:'fotó + név + telefon',cls:'B',
   html:`<div class="card"><div class="pic"><img src="${P}" alt=""></div><div class="info"><span class="eyebrow">Aki felveszi a telefont</span><div class="big">Nagy József</div><p class="sub">Egyéni vállalkozó szobafestő. Engem hív, én megyek ki, én festek — és én állok mögötte.</p>${phone}</div></div>`},
 'C':{nm:'Összehasonlító',desc:'cég vs. egy ember',cls:'C',
   html:`<span class="eyebrow">Miért más</span><div class="big">Tudja, kit hív.</div><div class="cols"><div class="col bad"><h3>Egy cégnél</h3><div class="li"><span class="x">✕</span> Ügyfélszolgálat, hibajegyszám</div><div class="li"><span class="x">✕</span> Más arc minden lépésnél</div><div class="li"><span class="x">✕</span> Alvállalkozók, váltott csapat</div></div><div class="col good"><h3>Nálam</h3><div class="li"><span class="v">✓</span> Engem hív közvetlenül</div><div class="li"><span class="v">✓</span> Ugyanaz az ember végig</div><div class="li"><span class="v">✓</span> Évek múlva is elérhető</div></div></div>${phone}`},
 'D':{nm:'Split portré + üzenet',desc:'kép + pipák + telefon',cls:'D',
   html:`<div class="g"><div class="portr"><img src="${P}" alt=""></div><div><span class="eyebrow">Nincs ügyfélszolgálat</span><div class="big">Tudja, <em>kit hív.</em></div><div class="checks"><div class="check">${chk}<div><b>Engem ér el</b> — nem egy központot.</div></div><div class="check">${chk}<div><b>Ugyanaz az ember</b> a felméréstől az átadásig.</div></div><div class="check">${chk}<div><b>Évek múlva is</b> felveszem a telefont.</div></div></div>${phone}</div></div>`},
 'E':{nm:'Idézet-fókusz + telefon',desc:'nagy idézet, mini portré',cls:'E',
   html:`<span class="eyebrow">Személyesen</span><div class="quote">„Engem hív, <em>nem egy központot.</em>"</div><div class="row"><span class="mini"><img src="${P}" alt=""></span>${phone}</div>`},
};
document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${v.html}</div>
  </section>`).join('');
</script>
</body>
</html>
