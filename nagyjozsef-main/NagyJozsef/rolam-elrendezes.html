<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rólam — elrendezés variációk + szabad húzás</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#ffffff;--bg2:#eaece4;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.16)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:66ch}

.gallery{max-width:1200px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

.sec{position:relative;overflow:hidden;padding:clamp(44px,5vw,72px) clamp(24px,4vw,56px);color:var(--head);min-height:480px;
  background:linear-gradient(125deg,var(--bg1),var(--bg2))}
.water{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:0;font-family:"Big Shoulders Display",sans-serif;font-weight:900;font-size:clamp(3.4rem,14vw,12rem);line-height:.8;color:transparent;-webkit-text-stroke:2px color-mix(in oklab,var(--accent) 20%,transparent);text-transform:uppercase;white-space:nowrap;pointer-events:none}
.in{position:relative;z-index:2}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
.pull{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(1.9rem,4vw,3.2rem);line-height:1.04;color:var(--head)}
.pull em{font-style:normal;color:var(--accent)}
.lead{color:var(--sub);font-size:1.05rem;max-width:46ch}
.sign{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.5rem;color:var(--head)}
.sign small{display:block;font-family:"Spline Sans Mono",monospace;font-size:.6rem;font-weight:400;letter-spacing:.16em;color:var(--label);text-transform:uppercase;margin-top:3px}
.portr{border-radius:50%;border:4px solid var(--accent);overflow:hidden;box-shadow:0 30px 60px -34px rgba(40,12,8,.5)}
.portr img{width:100%;height:100%;object-fit:cover;display:block}

/* A központi */
.A .in{text-align:center;max-width:780px;margin:0 auto}
.A .portr{width:clamp(180px,26vw,260px);aspect-ratio:1/1;margin:0 auto 22px}
.A .pull{margin:12px auto 0;max-width:20ch}.A .lead{margin:16px auto 0}.A .sign{display:inline-block;margin-top:20px}

/* B bal portré / jobb szöveg */
.B .in{display:grid;gap:clamp(26px,4vw,56px);align-items:center}
@media(min-width:780px){.B .in{grid-template-columns:.85fr 1.15fr}}
.B .portr{width:100%;aspect-ratio:4/5;border-radius:12px}
.B .pull{margin-top:10px}.B .lead{margin-top:16px}.B .sign{margin-top:20px}

/* C jobb portré / bal szöveg */
.C .in{display:grid;gap:clamp(26px,4vw,56px);align-items:center}
@media(min-width:780px){.C .in{grid-template-columns:1.15fr .85fr}.C .portr{order:2}}
.C .portr{width:100%;aspect-ratio:4/5;border-radius:12px}
.C .pull{margin-top:10px}.C .lead{margin-top:16px}.C .sign{margin-top:20px}

/* D portré felül + kétoszlop */
.D .in{text-align:center}
.D .portr{width:clamp(150px,20vw,210px);aspect-ratio:1/1;margin:0 auto 16px}
.D .pull{margin:0 auto;max-width:24ch}
.D .cols{display:grid;gap:clamp(20px,4vw,48px);margin-top:24px;text-align:left}
@media(min-width:680px){.D .cols{grid-template-columns:1fr 1fr}}
.D .sign{margin-top:8px}

/* E szabad húzás */
.E .canvas{position:relative;min-height:560px;overflow:hidden}
.E .drag{position:absolute;cursor:grab;touch-action:none;padding:6px 8px;border-radius:6px;transition:box-shadow .15s,outline-color .15s;outline:1.5px dashed transparent;max-width:min(86%,460px)}
.E .drag:hover{outline-color:color-mix(in oklab,var(--accent) 45%,transparent);box-shadow:0 8px 24px -12px rgba(40,12,8,.4)}
.E .drag.grabbing{cursor:grabbing;outline-color:var(--accent);outline-style:solid}
.E .drag::before{content:"⠿";position:absolute;top:2px;right:4px;font-size:.7rem;color:var(--accent);opacity:0;transition:.15s}
.E .drag:hover::before{opacity:.7}
.E .d-portr{padding:0;outline-offset:4px}
.E .d-portr .portr{width:clamp(140px,18vw,190px);aspect-ratio:1/1}
.E .toolbar{position:relative;z-index:5;display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.E .toolbar button{font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--head);cursor:pointer}
.E .toolbar button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.E .hint{font-family:"Spline Sans Mono",monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--label);align-self:center}
.E .out{position:relative;z-index:5;margin-top:12px;font-family:"Spline Sans Mono",monospace;font-size:.72rem;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 12px;white-space:pre-wrap;display:none}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>„Rólam" — elrendezés variációk</h1>
  <p>Négy kész elrendezés + egy <b>szabadon húzható</b> változat (E), ahol a szövegeket a kurzorral oda húzod, ahova szeretnéd. A portré helykitöltő munkafotó.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (A–E). Az E-ben rendezd el, másold ki a pozíciókat, és küldd el — pontosan úgy építem be.</footer>

<script>
const portrait='assets/1000010531-full.webp';
const NAME='NAGY JÓZSEF';
const eyebrow='<span class="eyebrow">Aki a munka mögött áll</span>';
const pull='<div class="pull">„Én megyek ki, én festek,<br><em>és én állok mögötte.</em>"</div>';
const lead='<p class="lead">Nagy József vagyok, egyéni vállalkozó szobafestő. Én megyek ki Önhöz, én végzem el a munkát, és én veszem fel a telefont évek múlva is.</p>';
const sign='<div class="sign">Nagy József<small>egyéni vállalkozó · szobafestő</small></div>';
const portrHTML='<div class="portr"><img src="'+portrait+'" alt=""></div>';

const statics={
 'A':{nm:'Központi',desc:'minden középen',html:`${portrHTML}${eyebrow}${pull}${lead}${sign}`},
 'B':{nm:'Bal portré / jobb szöveg',desc:'kétoszlop',html:`${portrHTML}<div>${eyebrow}${pull}${lead}${sign}</div>`},
 'C':{nm:'Jobb portré / bal szöveg',desc:'kétoszlop tükrözve',html:`${portrHTML}<div>${eyebrow}${pull}${lead}${sign}</div>`},
 'D':{nm:'Portré felül + kétoszlop',desc:'idézet fent, szöveg lent',html:`${portrHTML}${eyebrow}${pull}<div class="cols"><div>${lead}</div><div>${sign}</div></div>`},
};

let html=Object.entries(statics).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${id}"><div class="water">${NAME}</div><div class="in">${v.html}</div></div>
  </section>`).join('');

/* E szabad húzás */
html+=`
  <section class="concept">
    <div class="cmeta"><span class="id">E</span><span class="nm">Szabad elrendezés</span><span class="desc">húzd a kurzorral</span></div>
    <div class="sec E">
      <div class="toolbar">
        <button class="primary" id="copyPos">Pozíciók másolása</button>
        <button id="resetPos">Alaphelyzet</button>
        <span class="hint">↳ Fogd meg és húzd bármelyik blokkot</span>
      </div>
      <div class="water">${NAME}</div>
      <div class="canvas" id="canvas">
        <div class="drag d-portr" data-k="portré" style="left:6%;top:8%">${portrHTML}</div>
        <div class="drag" data-k="címke" style="left:40%;top:12%">${eyebrow}</div>
        <div class="drag" data-k="idézet" style="left:40%;top:24%">${pull}</div>
        <div class="drag" data-k="szöveg" style="left:40%;top:60%">${lead}</div>
        <div class="drag" data-k="aláírás" style="left:8%;top:78%">${sign}</div>
      </div>
      <div class="out" id="out"></div>
    </div>
  </section>`;

document.getElementById('gallery').innerHTML=html;

/* drag logic */
(function(){
  const canvas=document.getElementById('canvas');
  if(!canvas)return;
  const items=canvas.querySelectorAll('.drag');
  const init=[...items].map(el=>({el,left:el.style.left,top:el.style.top}));
  let active=null,offX=0,offY=0;
  items.forEach(el=>{
    el.addEventListener('pointerdown',e=>{
      active=el;el.classList.add('grabbing');el.style.zIndex=20;
      const r=el.getBoundingClientRect();offX=e.clientX-r.left;offY=e.clientY-r.top;
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove',e=>{
      if(active!==el)return;
      const c=canvas.getBoundingClientRect();
      let x=e.clientX-c.left-offX, y=e.clientY-c.top-offY;
      x=Math.max(0,Math.min(c.width-el.offsetWidth,x));
      y=Math.max(0,Math.min(c.height-el.offsetHeight,y));
      el.style.left=(x/c.width*100).toFixed(1)+'%';
      el.style.top=(y/c.height*100).toFixed(1)+'%';
    });
    el.addEventListener('pointerup',e=>{if(active===el){el.classList.remove('grabbing');active=null;}});
  });
  document.getElementById('resetPos').onclick=()=>{init.forEach(i=>{i.el.style.left=i.left;i.el.style.top=i.top;});document.getElementById('out').style.display='none';};
  document.getElementById('copyPos').onclick=()=>{
    const lines=[...items].map(el=>`${el.dataset.k.padEnd(8,' ')}: bal ${el.style.left}, fent ${el.style.top}`);
    const txt='RÓLAM — szabad elrendezés pozíciói:\n'+lines.join('\n');
    const out=document.getElementById('out');out.textContent=txt;out.style.display='block';
    navigator.clipboard&&navigator.clipboard.writeText(txt);
  };
})();
</script>
</body>
</html>
