<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Referencia szekció — ötletek</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#ffffff;--bg2:#eaece4;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.14)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}

.gallery{max-width:1240px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

.sec{background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(36px,4vw,56px) clamp(22px,3.5vw,46px);color:var(--head);overflow:hidden}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.72rem;letter-spacing:.26em;color:var(--label);display:block}
.sec h2{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(1.9rem,3.6vw,2.9rem);line-height:1.02;margin-top:12px;max-width:22ch}
.body{margin-top:clamp(28px,3.5vw,44px)}
.ph{position:relative;overflow:hidden;border-radius:10px}
.ph img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .55s}
.cap{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:18px;color:#fff;background:linear-gradient(180deg,transparent 40%,rgba(40,12,8,.8))}
.cap .pl{font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:#ffc7b3}
.cap .t{font-family:"Big Shoulders Display",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.2rem;margin-top:3px}

/* A rács galéria */
.A .body{display:grid;gap:12px;grid-template-columns:repeat(2,1fr)}
@media(min-width:760px){.A .body{grid-template-columns:repeat(3,1fr)}}
.A .g{aspect-ratio:4/3}.A .g:hover .ph img{transform:scale(1.06)}
.A .g .ph{aspect-ratio:4/3}

/* B mozaik */
.B .body{display:grid;grid-template-columns:1fr 1fr;gap:12px;grid-auto-rows:150px}
@media(min-width:760px){.B .body{grid-template-columns:repeat(4,1fr);grid-auto-rows:160px}}
.B .g{position:relative}.B .g .ph{position:absolute;inset:0;border-radius:10px}
.B .g:hover .ph img{transform:scale(1.06)}
.B .g:nth-child(1){grid-column:span 2;grid-row:span 2}
.B .g:nth-child(4){grid-row:span 2}

/* C carousel */
.C .body{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:12px}
.C .g{flex:0 0 min(72vw,360px);scroll-snap-align:start}
.C .g .ph{aspect-ratio:4/5}
.C .hint{margin-top:8px;font-family:"Spline Sans Mono",monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}

/* D featured + thumbnails */
.D .body{display:grid;gap:16px}
@media(min-width:820px){.D .body{grid-template-columns:1.4fr 1fr;align-items:start}}
.D .feat .ph{aspect-ratio:4/3;border:3px solid var(--accent);border-radius:10px}
.D .thumbs{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.D .thumbs .ph{aspect-ratio:1/1}
.D .thumbs .g:hover .ph img{transform:scale(1.06)}

/* E előtte/utána */
.E .body{display:grid;gap:18px}
@media(min-width:760px){.E .body{grid-template-columns:1fr 1fr}}
.E .pair{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--line);box-shadow:0 18px 40px -30px rgba(40,12,8,.4)}
.E .imgs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.E .imgs .ph{aspect-ratio:3/4}
.E .tg{position:absolute;top:8px;left:8px;z-index:2;font-family:"Spline Sans Mono",monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;background:rgba(40,12,8,.72);color:#fff;padding:4px 8px;border-radius:100px}
.E .lab{margin-top:10px;padding:0 4px 4px;font-weight:700}

/* F képes idézet */
.F .body{display:grid;gap:18px}
@media(min-width:820px){.F .body{grid-template-columns:1fr 1fr}}
.F .q{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line);box-shadow:0 18px 40px -30px rgba(40,12,8,.4);display:grid;grid-template-columns:40% 1fr}
.F .q .ph{border-radius:0;aspect-ratio:auto;min-height:170px}
.F .q .tx{padding:22px 24px}
.F .q blockquote{font-size:1.08rem;line-height:1.4;color:var(--head)}
.F .q .by{margin-top:12px;font-family:"Spline Sans Mono",monospace;font-size:.68rem;letter-spacing:.06em;color:var(--sub)}
.F .q .st{color:var(--accent);letter-spacing:2px}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>Referencia szekció — ötletek</h1>
  <p>Elkészült munkák bemutatása a fotóiddal. 6 elrendezés — válassz egyet.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (A–F), és beépítem az igazi index.html referencia-szekciójába</footer>

<script>
const P=[
  ['assets/1000010639-full.webp','Hálószoba · Budapest','Hangsúlyfal'],
  ['assets/1000010531-full.webp','Nappali · Frissen festve','Falfelújítás'],
  ['assets/1000010558-full.webp','Fürdőszoba','Pasztell tónus'],
  ['assets/1000010596-full.webp','Családi ház','Homlokzat'],
  ['assets/1000010597-full.webp','Konyha','Mázolás'],
  ['assets/1000010636-full.webp','Dekorfal','Tapéta'],
];
const head=`<span class="eyebrow">Válogatott munkák</span><h2>Referenciák — falak, amiket újra megszerettek.</h2>`;
const tile=p=>`<div class="g"><div class="ph"><img src="${p[0]}" alt=""></div><div class="cap"><div class="pl">${p[1]}</div><div class="t">${p[2]}</div></div></div>`;

const V={
 'A':{nm:'Rács galéria',desc:'3 oszlopos · hover felirat',cls:'A',
   body:`<div class="body">${P.map(tile).join('')}</div>`},
 'B':{nm:'Mozaik',desc:'változó méretű fotók',cls:'B',
   body:`<div class="body">${P.map(tile).join('')}</div>`},
 'C':{nm:'Vízszintes görgető',desc:'carousel · snap',cls:'C',
   body:`<div class="body">${P.map(tile).join('')}</div><div class="hint">← húzd oldalra →</div>`},
 'D':{nm:'Kiemelt + thumbnailek',desc:'nagy fő kép + rács',cls:'D',
   body:`<div class="body"><div class="feat g"><div class="ph"><img src="${P[0][0]}" alt=""></div><div class="cap"><div class="pl">${P[0][1]}</div><div class="t">${P[0][2]}</div></div></div><div class="thumbs">${P.slice(1,5).map(tile).join('')}</div></div>`},
 'E':{nm:'Előtte / utána',desc:'páros összehasonlítás',cls:'E',
   body:`<div class="body">${[[P[1],P[0]],[P[4],P[5]]].map(pr=>`<div class="pair"><div class="imgs"><div class="ph" style="position:relative"><span class="tg">Előtte</span><img src="${pr[0][0]}" alt=""></div><div class="ph" style="position:relative"><span class="tg">Utána</span><img src="${pr[1][0]}" alt=""></div></div><div class="lab">${pr[1][1]}</div></div>`).join('')}</div>`},
 'F':{nm:'Képes idézet',desc:'vélemény + munka fotó',cls:'F',
   body:`<div class="body">${[[P[0],'„Tiszta, precíz munka, és pontosan annyiba került, amennyit megbeszéltünk."','K. Anna · Budapest'],[P[3],'„Évek óta őt hívom, mindig megbízható. A homlokzat újra olyan, mint új korában."','T. Gábor · Pest m.']].map(q=>`<div class="q"><div class="ph"><img src="${q[0][0]}" alt=""></div><div class="tx"><blockquote>${q[1]}</blockquote><div class="by"><span class="st">★★★★★</span><br>${q[2]}</div></div></div>`).join('')}</div>`},
};

document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec ${v.cls}">${head}${v.body}</div>
  </section>`).join('');
</script>
</body>
</html>
