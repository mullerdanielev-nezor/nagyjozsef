<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nyírlugos térkép — elrendezések (szöveg a térkép mellett)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;800;900&family=Public+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#f1ede3;--bg2:#e8e2d6;--head:#3f1717;--accent:#b7472a;--label:#6d2c1c;--sub:#555555;--line:rgba(63,23,23,.16)}
body{font-family:"Public Sans",system-ui,sans-serif;background:#1c1413;color:#efe7e4;line-height:1.55;-webkit-font-smoothing:antialiased}

.pagehead{padding:50px clamp(20px,5vw,70px) 16px;max-width:1000px;margin:0 auto;text-align:center}
.pagehead h1{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem)}
.pagehead p{margin:12px auto 0;color:#b6a9a5;max-width:64ch}

.gallery{max-width:1240px;margin:0 auto;padding:14px clamp(10px,2.5vw,30px) 90px;display:grid;gap:30px}
.concept{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px -42px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08)}
.cmeta{display:flex;align-items:baseline;gap:12px;padding:14px 22px;background:#2a1d1b;border-bottom:1px solid rgba(255,255,255,.07)}
.cmeta .id{font-family:"Big Shoulders Display",sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent)}
.cmeta .nm{font-weight:700;font-size:1rem}
.cmeta .desc{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:.62rem;letter-spacing:.05em;color:#b09a95;text-transform:uppercase}

.sec{background:linear-gradient(125deg,var(--bg1),var(--bg2));padding:clamp(34px,4vw,52px) clamp(24px,4vw,54px);color:var(--head)}
.eyebrow{font-family:"Spline Sans Mono",monospace;text-transform:uppercase;font-size:.7rem;letter-spacing:.26em;color:var(--label);display:block}
h2{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;color:var(--head);font-size:clamp(1.7rem,3.2vw,2.6rem);line-height:1.02;margin-top:10px}
.sub{color:var(--sub);margin-top:12px;max-width:42ch}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.chip{font-family:"Spline Sans Mono",monospace;font-size:.72rem;padding:8px 13px;border:1px solid color-mix(in oklab,var(--accent) 40%,transparent);border-radius:100px;color:var(--head);background:#fff}
.cta{display:inline-flex;align-items:center;gap:8px;font-family:"Spline Sans Mono",monospace;font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;background:#1a1a1a;color:#fff;padding:14px 24px;border-radius:100px;text-decoration:none;margin-top:18px}

.map{border:3px solid var(--accent);border-radius:12px;overflow:hidden;box-shadow:0 30px 60px -42px rgba(40,12,8,.45);background:#efe7d8}
.svgmap{width:100%;height:100%;display:block;min-height:240px}
.svgmap .region{fill:color-mix(in oklab,var(--accent) 7%,#f6efe2);stroke:color-mix(in oklab,var(--accent) 30%,transparent);stroke-width:2}
.svgmap .road{fill:none;stroke:color-mix(in oklab,var(--accent) 38%,transparent);stroke-width:2.4;stroke-linecap:round}
.svgmap .town{fill:var(--head)}.svgmap .town.main{fill:var(--accent)}
.svgmap .lbl{font-family:"Spline Sans Mono",monospace;font-size:13px;fill:var(--head);text-transform:uppercase}
.svgmap .lbl.main{font-family:"Big Shoulders Display";font-weight:800;font-size:19px;fill:var(--accent)}

/* layouts */
.L{display:grid;gap:clamp(22px,3.5vw,46px);align-items:center}
@media(min-width:820px){
 .La{grid-template-columns:0.85fr 1.15fr}
 .Lb{grid-template-columns:1.15fr 0.85fr}
 .Lb .txt{order:2}
 .Lc{grid-template-columns:1fr 1.2fr}
 .Ld{grid-template-columns:1.2fr 1fr}.Ld .txt{order:2}
 .Le{grid-template-columns:0.7fr 1.3fr;align-items:stretch}
}
.La .map,.Lb .map,.Lc .map{aspect-ratio:16/11}
.Ld .map{aspect-ratio:4/3}
.Le .map{min-height:100%}
.Le .svgmap{height:100%}

/* F: térkép felül szöveggel mellette + chipek alul külön sáv */
.Lf{display:block}
.Lf .top{display:grid;gap:clamp(22px,3.5vw,46px);align-items:center}
@media(min-width:820px){.Lf .top{grid-template-columns:1fr 1.1fr}}
.Lf .map{aspect-ratio:16/10}
.Lf .band{margin-top:22px;border-top:1px solid var(--line);padding-top:18px;display:flex;flex-wrap:wrap;align-items:center;gap:14px;justify-content:space-between}

/* D kártya átfedés */
.Ld .panel{background:#fff;border-radius:14px;padding:clamp(22px,3vw,32px);box-shadow:0 26px 50px -38px rgba(40,12,8,.4);border:1px solid var(--line)}
@media(min-width:820px){.Ld .panel{margin-left:-18%;position:relative;z-index:2}}

footer{text-align:center;padding:20px;color:#8a7a76;font-family:"Spline Sans Mono",monospace;font-size:.7rem;letter-spacing:.14em}
</style>
</head>
<body>

<header class="pagehead">
  <h1>Térkép-elrendezések — szöveg a térkép mellett</h1>
  <p>Hat elrendezés, ahol a szöveg a térkép mellett áll. A térkép a stilizált (brand-színű) változat — a stílus külön cserélhető. Válassz egy elrendezést.</p>
</header>

<main class="gallery" id="gallery"></main>
<footer>Válassz egy betűt (A–F), és azt építem be (a választott térkép-stílussal együtt)</footer>

<script>
const map=`<div class="map"><svg class="svgmap" viewBox="0 0 600 412" preserveAspectRatio="xMidYMid slice">
<path class="region" d="M70,170 C50,100 160,60 250,78 C345,45 470,68 525,135 C580,178 562,275 478,312 C398,350 250,348 180,318 C100,330 80,235 70,170 Z"/>
<path class="road" d="M120,140 C220,170 330,150 480,195"/>
<path class="road" d="M300,80 C322,175 300,270 332,340"/>
<path class="road" d="M180,290 C280,250 360,285 480,260"/>
<g><circle class="town" cx="300" cy="92" r="5"/><text class="lbl" x="312" y="96">Nyíregyháza</text></g>
<g><circle class="town" cx="160" cy="195" r="5"/><text class="lbl" x="172" y="199">Nyíradony</text></g>
<g><circle class="town" cx="478" cy="205" r="5"/><text class="lbl" x="490" y="209">Nyírbátor</text></g>
<g><circle class="town" cx="300" cy="290" r="5"/><text class="lbl" x="312" y="294">Nyírbéltek</text></g>
<g><circle class="town" cx="460" cy="305" r="5"/><text class="lbl" x="472" y="309">Penészlek</text></g>
<g><circle class="town" cx="165" cy="320" r="5"/><text class="lbl" x="177" y="324">Debrecen</text></g>
<g><circle class="town main" cx="332" cy="200" r="8"/><text class="lbl main" x="347" y="206">Nyírlugos</text></g>
</svg></div>`;
const AREAS=['Nyírlugos','Nyírbátor','Nyíradony','Nyírbéltek','Penészlek','Debrecen'];
const chips=`<div class="chips">${AREAS.map(a=>`<span class="chip">${a}</span>`).join('')}</div>`;
const cta=`<a class="cta" href="#">Hívjon · 06 70 603 9556</a>`;
const txt=(withChips=true,withCta=true)=>`<div class="txt"><span class="eyebrow">Hol dolgozom</span><h2>Nyírlugos és környéke</h2><p class="sub">Nyírlugosról dolgozom, a környező településeken is — a pontos munkaterületet telefonon egyezzük le.</p>${withChips?chips:''}${withCta?cta:''}</div>`;

const V={
 'A':{nm:'Szöveg balra · térkép jobbra',desc:'40 / 60',cls:'L La',html:`${txt()}${map}`},
 'B':{nm:'Térkép balra · szöveg jobbra',desc:'60 / 40',cls:'L Lb',html:`${map}${txt()}`},
 'C':{nm:'Keskeny szöveg · nagy térkép',desc:'asszimetrikus',cls:'L Lc',html:`${txt()}${map}`},
 'D':{nm:'Térkép + átfedő szövegkártya',desc:'panel a térképre lóg',cls:'L Ld',html:`${map}<div class="txt"><div class="panel"><span class="eyebrow">Hol dolgozom</span><h2>Nyírlugos és környéke</h2><p class="sub">Nyírlugosról dolgozom, a környező településeken is.</p>${chips}${cta}</div></div>`},
 'E':{nm:'Teljes magasságú térkép',desc:'szöveg balra, térkép kitölt',cls:'L Le',html:`${txt()}${map}`},
 'F':{nm:'Szöveg+térkép felül · chip-sáv alul',desc:'kétszintes',cls:'Lf',html:`<div class="top">${txt(false,true)}${map}</div><div class="band"><div class="chips" style="margin:0">${AREAS.map(a=>`<span class="chip">${a}</span>`).join('')}</div><span style="font-family:'Spline Sans Mono';font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--label)">+ Nyíregyháza</span></div>`},
};

document.getElementById('gallery').innerHTML=Object.entries(V).map(([id,v])=>`
  <section class="concept">
    <div class="cmeta"><span class="id">${id}</span><span class="nm">${v.nm}</span><span class="desc">${v.desc}</span></div>
    <div class="sec"><div class="${v.cls}">${v.html}</div></div>
  </section>`).join('');
</script>
</body>
</html>
